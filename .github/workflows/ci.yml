name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (Ubuntu, Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Type check
        run: uv run pyright src/

  test:
    name: Test (Ubuntu, Python 3.12)
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Tests with coverage
        run: |
          uv run pytest tests/ \
            --cov=src/procontext \
            --cov-report=term-missing \
            --cov-fail-under=90

  package-smoke:
    name: Package smoke (Ubuntu, Python 3.12)
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Build package
        run: uv build

      - name: Install built wheel into clean virtual environment
        run: |
          python -m venv .pkg-smoke
          ./.pkg-smoke/bin/pip install dist/*.whl

      - name: Verify installed CLI entrypoints
        run: |
          ./.pkg-smoke/bin/procontext --help
          ./.pkg-smoke/bin/procontext doctor --help

  check-installer-changes:
    name: Check installer changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for installer file changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            BASE="${{ github.event.before }}"
          else
            BASE="origin/${{ github.base_ref }}"
          fi
          if git diff --name-only "$BASE" HEAD | grep -qE '^install\.(sh|ps1)$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  installer-smoke-unix:
    name: Installer smoke (Unix dry-run)
    runs-on: ubuntu-latest
    needs: [validate, check-installer-changes]
    if: needs.check-installer-changes.outputs.changed == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Bash syntax check
        run: bash -n install.sh

      - name: Default installer dry-run
        run: bash install.sh --dry-run

      - name: Source fallback installer dry-run
        run: bash install.sh --from-source --dry-run --dir /tmp/procontext-install-test

  installer-smoke-windows:
    name: Installer smoke (Windows dry-run)
    runs-on: windows-latest
    needs: [validate, check-installer-changes]
    if: needs.check-installer-changes.outputs.changed == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Windows PowerShell default dry-run
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\install.ps1 -DryRun

      - name: Windows PowerShell source dry-run
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\install.ps1 -FromSource -DryRun

      - name: PowerShell 7 default dry-run
        shell: pwsh
        run: pwsh -NoProfile -File .\install.ps1 -DryRun

      - name: PowerShell 7 source dry-run
        shell: pwsh
        run: pwsh -NoProfile -File .\install.ps1 -FromSource -DryRun

  smoke-platform:
    name: Smoke (${{ matrix.os }}, Python 3.12)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Verify CLI entrypoint
        run: uv run procontext --help

  audit:
    name: Dependency audit (Ubuntu, Python 3.12)
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Dependency audit
        run: uv run pip-audit --skip-editable
