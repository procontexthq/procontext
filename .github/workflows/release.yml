name: Release

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Type check
        run: uv run pyright src/

      - name: Tests with coverage
        run: |
          uv run pytest tests/ \
            --cov=src/procontext \
            --cov-report=term-missing \
            --cov-fail-under=90

      - name: Dependency audit
        run: uv run pip-audit --skip-editable

  package-smoke:
    name: Package smoke before release
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Build package
        run: uv build

      - name: Install built wheel into clean virtual environment
        run: |
          python -m venv .pkg-smoke
          ./.pkg-smoke/bin/pip install dist/*.whl

      - name: Verify installed CLI entrypoints
        run: |
          ./.pkg-smoke/bin/procontext --help
          ./.pkg-smoke/bin/procontext doctor --help

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [validate, package-smoke]
    environment:
      name: pypi
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required for semantic-release to scan commits
          # since the last tag and determine the correct version bump.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Bump version and push tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run semantic-release version

      - name: Build package
        run: uv build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist/

      - name: Publish to PyPI
        # Requires a Trusted Publisher configured on pypi.org:
        #   Owner:    procontexthq
        #   Repo:     procontext
        #   Workflow: release.yml
        #   Env:      pypi
        run: uv publish --trusted-publishing always
